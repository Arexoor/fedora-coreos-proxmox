# kernel config
    - path: /etc/sysctl.d/20-silence-audit.conf
      mode: 0644
      contents:
        inline: |
          # Raise console message logging level from DEBUG (7) to WARNING (4)
          # to hide audit messages from the interactive console
          kernel.printk=4

    - path: /etc/sysctl.d/90-unprivileged-ports.conf
      mode: 0644
      contents:
        inline: |
          net.ipv4.ip_unprivileged_port_start=23

    - path: /etc/sysctl.d/91-ipv6-privacy.conf
      mode: 0644
      contents:
        inline: |
          net.ipv6.conf.default.temp_prefered_lft = 1500
          net.ipv6.conf.default.temp_valid_lft = 1800

    - path: /etc/sysctl.d/99-tailscale.conf
      mode: 0644
      contents:
        inline: |
          net.ipv4.ip_forward = 1
          net.ipv6.conf.all.forwarding = 1


# creating podman network for the reverse proxy
    - path: /etc/containers/systemd/users/1000/rproxy.network
      mode: 0644
      contents:
        inline: |
          [Network]
          Subnet=10.90.0.0/24
          Gateway=10.90.0.1
          IPRange=10.90.0.128/25
          Internal=true
          NetworkName=rproxy

    # Bridge-Interface Konfiguration
    - path: /etc/systemd/network/10-br-tailscale.netdev
      mode: 0644
      contents:
        inline: |
          [NetDev]
          Name=br-tailscale
          Kind=bridge

    - path: /etc/systemd/network/20-br-tailscale.network
      mode: 0644
      contents:
        inline: |
          [Match]
          Name=br-tailscale

          [Network]
          Address=10.90.100.1/24
          IPForward=yes

          [Bridge]
          STP=no

    - path: /etc/containers/systemd/users/1000/tailscale.network
      mode: 0644
      contents:
        inline: |
          [Network]
          Driver=ipvlan
          Options=parent=br-tailscale
          Options=mode=l2
          Subnet=10.90.100.1/24
          IPRange=10.90.100.10/24

# adding hawser Quadlet
    - path: /etc/containers/systemd/users/1000/hawser.container
      mode: 0644
      contents:
        inline: |
          [Unit]
          Description=hawser
          After=default.target
          Requires=default.target
          After=socket-proxy-hawser.container
          Requires=socket-proxy-hawser.container

          [Container]
          Image=ghcr.io/finsys/hawser:latest
          ContainerName=hawser
          AutoUpdate=registry

          # Persist state across reboots
          Volume=/var/home/core/.local/share/containers/storage/volumes/hawser/_data:/var/home/core/.local/share/containers/storage/volumes/hawser/_data:Z
          Network=tailscale.network:ip=10.90.100.20

          # Security permissions
          SecurityLabelType=container_runtime_t

          Environment=DATA_DIR=/var/home/core/.local/share/containers/storage/volumes/hawser/_data

          [Service]
          Restart=always
          TimeoutStartSec=300
          ExecStartPre=mkdir -p /var/home/core/.local/share/containers/storage/volumes/hawser/_data

          [Install]
          WantedBy=default.target

    # - path: /etc/containers/containers.conf
    #   mode: 0644
    #   contents:
    #     inline: |
    #       [engine]
    #       # volume path override
    #       volume_path = "/var/mnt/volume-storage"

    - path: /var/home/core/.config/containers/containers.conf
      mode: 0644
      contents:
        inline: |
          [containers]
          log_size_max=10485760

    # - path: /etc/containers/storage.conf
    #   mode: 0644
    #   contents:
    #     inline: |
    #       [storage]
    #       #https://github.com/containers/storage/blob/main/docs/containers-storage.conf.5.md
    #       driver = "overlay"
    #       imagestore = "/var/mnt/image-storage"

    - path: /etc/zincati/config.d/55-updates-strategy.toml
      contents:
        inline: |
          [updates]
          strategy = "periodic"
          [[updates.periodic.window]]
          days = [ "Sat", "Sun" ]
          start_time = "6:30"
          length_minutes = 60

# Enabling podman.socket for the User core
  directories:
    - path: /var/home/core/.config
      user:
        name: core
      group:
        name: core
      mode: 0700

    - path: /var/home/core/.config/systemd
      user:
        name: core
      group:
        name: core
      mode: 0755

    - path: /var/home/core/.config/systemd/user
      user:
        name: core
      group:
        name: core
      mode: 0755

    - path: /var/home/core/.config/systemd/user/sockets.target.wants
      user:
        name: core
      group:
        name: core
      mode: 0755

  links:
    - path: /var/home/core/.config/systemd/user/sockets.target.wants/podman.socket
      target: /usr/lib/systemd/user/podman.socket
      user:
        name: core
      group:
        name: core
    - path: /var/home/core/.config/systemd/user/default.target.wants/podman-restart.service
      target: /usr/lib/systemd/user/podman-restart.service
      user:
        name: core
      group:
        name: core

# arexoor-motd.service
systemd:
  units:
    - name: tailscale-connect.service
      enabled: true
      contents: |
        [Unit]
        Description=Tailscale Connect (Exit Node + Subnet Router + SSH)
        After=tailscaled.service network-online.target
        Wants=network-online.target
        Requires=tailscaled.service

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/bin/tailscale set \
          --advertise-exit-node \
          --advertise-routes=10.90.100.0/24 \
          --accept-routes \
          --ssh

        [Install]
        WantedBy=multi-user.target

    - name: rpm-ostree-install-tailscale.service
      enabled: true
      contents: |
        [Unit]
        Description=Layer tailscale with rpm-ostree
        Wants=network-online.target
        After=network-online.target
        Before=zincati.service
        ConditionPathExists=!/var/lib/%N.stamp

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/bin/rpm-ostree install --apply-live --allow-inactive tailscale
        ExecStart=/bin/touch /var/lib/%N.stamp
        ExecStart=/usr/bin/systemctl enable tailscaled
        ExecStart=/usr/bin/systemctl start tailscaled

        [Install]
        WantedBy=multi-user.target

    - name: arexoor-motd.service
      enabled: true
      contents: |
        [Unit]
        Description=arexoor Motd
        After=network-online.target

        [Service]
        Type=oneshot
        ExecStart=/usr/local/bin/arexoor-motd
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

# geco-cloudinit: apply cloudinit settings on boot
    - name: geco-cloudinit.service
      enabled: true
      contents: |
        [Unit]
        Description=Geco-iT Cloudinit
        Wants=network-online.target
        After=network.target network-online.target

        [Service]
        Type=oneshot
        TimeoutStartSec=0
        ExecStart=/usr/local/bin/geco-cloudinit
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

# qemu-guest-agent
    - name: setup-qemu-guest-agent.service
      enabled: true
      contents: |
        [Unit]
        Description=arexoor Setup Qemu Guest Agent
        After=network-online.target
        Require=network-online.target
        ConditionKernelCommandLine=ignition.platform.id=qemu
        ConditionPathExists=!/var/lib/qemu-guest-agent.stamp

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/bin/rpm-ostree install qemu-guest-agent
        ExecStart=/bin/touch /var/lib/qemu-guest-agent.stamp
        ExecStart=/bin/systemctl --no-block reboot

        [Install]
        WantedBy=multi-user.target

# fstrim
    - name: fstrim.timer
      enabled: true

    - name: fstrim.service
      dropins:
        - name: override.conf
          contents: |
            [Service]
            ExecStart=
            ExecStart=/sbin/fstrim -av

# Enable linger for the user
    - name: enable-linger-core.service
      enabled: true
      contents: |
        [Unit]
        Description=Enable linger for core user
        After=systemd-user-sessions.service

        [Service]
        Type=oneshot
        ExecStart=/usr/bin/loginctl enable-linger core

        [Install]
        WantedBy=multi-user.target
