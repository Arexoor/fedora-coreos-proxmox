# motd script
    - path: /usr/local/bin/arexoor-motd
      mode: 0755
      contents:
        inline: |
          #!/bin/bash

          OUT=/etc/motd.d/00_arexoor.motd

          mkdir -p "$(dirname "$OUT")"

          echo -e "\nWelcome on a server powered by\n" > ${OUT}
          echo "                                         _            " >> ${OUT}
          echo "   __ _ _ __ _____  _____   ___  _ __ __| | _____   __" >> ${OUT}
          echo "  / _` | '__/ _ \ \/ / _ \ / _ \| '__/ _` |/ _ \ \ / /" >> ${OUT}
          echo " | (_| | | |  __/>  < (_) | (_) | |_| (_| |  __/\ V /"; >> ${OUT}
          echo "  \__,_|_|  \___/_/\_\___/ \___/|_(_)\__,_|\___| \_/  " >> ${OUT}
          echo -e "\e[33mKernel:\e[0m $(uname -r)" >> ${OUT}
          echo -ne "\e[33mCPU:\e[0m $(grep ^processor /proc/cpuinfo | wc -l)" >> ${OUT}
          echo "$(grep "^model name" /proc/cpuinfo | head -n1 | awk -F: '{print $2}' | awk -F@ '{print $1}')" >> ${OUT}
          echo -e "\e[33mRAM:\e[0m $(free | grep Mem | awk '{print $2}' | xargs -i expr {} / 1000 / 1000 | xargs -i printf '%.0fG\n' {})" >> ${OUT}
          i=0; for disk in $(ls /dev/sd[a-z] /dev/vd[a-z] 2>/dev/null); do
                lsblk > /dev/null 2>&1 || break
                echo -e "\e[33mHDD${i} ($(basename ${disk})):\e[0m$(lsblk -n --nodeps ${disk} -o size)" >> ${OUT}
                i=$((i+1))
          done
          echo -e "\n\e[33mHostname:\e[0m "$(hostname -f) >> ${OUT}
          sleep 1; echo -e "\e[33mIPv4 Address:\e[0m $(ip route get 8.8.8.8 | awk 'NR==1 {print $7}')" >> ${OUT}
          echo -e "\e[33mPublic IPv4 Address:\e[0m $(curl https://ipv4.icanhazip.com)\n" >> ${OUT}

# virtiofs automount script
    - path: /usr/local/bin/geco-virtiofs
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          #
          #  Discover virtiofs devices from /sys/fs/virtiofs/<n>/tag and mount
          #  them under /var/mnt/<tag> via generated systemd mount units.
          #  Idempotent: runs on every boot, removes mounts whose virtiofs device
          #  is gone and exits non-zero if a mount cannot be started (used as a
          #  safeguard so containers do not start without their storage).
          #
          # ===================================================================================
          declare -r VERSION=1.2607

          SYSFS_PATH=/sys/fs/virtiofs
          UNIT_PATH=/etc/systemd/system
          MARKER="# managed-by=geco-virtiofs"
          OLD_MARKER="# managed-by=cloudinit-virtiofs" # adopt units of the old vendor-data logic

          FAILED=false

          # without the sysfs interface we cannot tell which mounts are valid,
          # never treat existing mounts as orphans in that case
          [[ -d "${SYSFS_PATH}" ]]|| {
            echo "[WARN]: Virtiofs: ${SYSFS_PATH} not available, leaving mounts untouched..."
            exit 0
          }

          # collect all currently managed unit files, assume orphan until confirmed
          declare -A active_units
          for unit_path in "${UNIT_PATH}"/*.mount; do
            [[ -e "${unit_path}" ]]|| continue
            grep -q -e "^${MARKER}$" -e "^${OLD_MARKER}$" "${unit_path}" 2>/dev/null && \
              active_units["$(basename "${unit_path}")"]="orphan"
          done

          # generate, enable and start a mount unit per virtiofs tag
          for tag_file in "${SYSFS_PATH}"/*/tag; do
            [[ -e "${tag_file}" ]]|| continue
            tag="$(cat "${tag_file}")"
            [[ -n "${tag}" ]]|| continue

            where="/var/mnt/${tag}"
            unit_file="$(systemd-escape --path --suffix=mount "${where}")"
            unit_path="${UNIT_PATH}/${unit_file}"
            active_units["${unit_file}"]="confirmed"

            unit_content="${MARKER}
          [Unit]
          Description=Mount VirtioFS ${tag} directory
          DefaultDependencies=no

          After=sysinit.target
          Before=multi-user.target

          [Mount]
          What=${tag}
          Where=${where}
          Type=virtiofs
          Options=rw,relatime

          [Install]
          WantedBy=multi-user.target"

            if [[ -e "${unit_path}" ]] && [[ "x$(cat "${unit_path}")" == "x${unit_content}" ]]; then
              systemctl --quiet is-active "${unit_file}" && {
                echo "[INFO]: Virtiofs: mount ${unit_file} unchanged and active, skipping..."
                continue
              }
            else
              echo -n "[INFO]: Virtiofs: writing systemd mount unit ${unit_file}... "
              echo "${unit_content}" > "${unit_path}" || { echo "[failed]"; FAILED=true; continue; }
              echo "[done]"
              systemctl daemon-reload
            fi

            [[ -d "${where}" ]]|| mkdir -p "${where}"

            echo -n "[INFO]: Virtiofs: enabling and starting ${unit_file}... "
            systemctl enable "${unit_file}" 2>/dev/null && \
            systemctl start "${unit_file}" || { echo "[failed]"; FAILED=true; continue; }
            echo "[done]"
          done

          # cleanup orphaned units (managed by us, but the virtiofs device is gone)
          needs_daemon_reload=false
          for unit_file in "${!active_units[@]}"; do
            [[ "${active_units[${unit_file}]}" == "confirmed" ]]&& continue

            unit_path="${UNIT_PATH}/${unit_file}"
            echo "[INFO]: Virtiofs: orphaned mount unit detected: ${unit_file}"

            echo -n "[INFO]: Virtiofs: stopping ${unit_file}... "
            systemctl stop "${unit_file}" 2>/dev/null && echo "[done]" || echo "[not active]"

            echo -n "[INFO]: Virtiofs: disabling ${unit_file}... "
            systemctl disable "${unit_file}" 2>/dev/null && echo "[done]" || echo "[not enabled]"

            mountpoint="$(grep ^Where= "${unit_path}" | cut -d= -f2)"
            echo -n "[INFO]: Virtiofs: removing unit file ${unit_file}... "
            rm -f "${unit_path}" && echo "[done]" || echo "[failed]"

            [[ -n "${mountpoint}" ]] && [[ -d "${mountpoint}" ]] && \
              rmdir "${mountpoint}" 2>/dev/null

            needs_daemon_reload=true
          done
          ${needs_daemon_reload} && systemctl daemon-reload

          ${FAILED} && {
            echo "[ERROR]: Virtiofs: at least one mount failed..."
            exit 1
          }

          exit 0

# network configuration script
    - path: /usr/local/bin/geco-network
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          #
          #  Generate NetworkManager keyfiles from the cloudinit network-config
          #  merged with the Proxmox notes overrides (vendor-data network section).
          #  File based and idempotent: runs on every boot and only reloads the
          #  network when a generated keyfile differs from what is on disk.
          #
          #  Notes format (in the Proxmox VM notes field):
          #    [net0]
          #    mac=bc:24:11:aa:bb:cc
          #    ipv4=192.168.1.10/24     (or: dhcp)
          #    ipv4_gateway=192.168.1.1
          #    ipv6=slaac               (slaac|dhcp|disabled)
          #    ipv6_privacy=on          (on|off)
          #
          # ===================================================================================
          declare -r VERSION=1.2607

          CIPATH=/run/cloudinit
          NMPATH=/etc/NetworkManager/system-connections
          YQ="/usr/local/bin/yq read --exitStatus --printMode v --stripComments --"

          # ===================================================================================
          # functions()
          MOUNTED_BY_ME=false
          catch() {
            ${MOUNTED_BY_ME} && umount ${CIPATH} && rmdir ${CIPATH}
          }
          trap 'catch' EXIT

          mask2cdr()
          {
            # Assumes there's no "255." after a non-255 byte in the mask
            local x=${1##*255.}
            set -- 0^^^128^192^224^240^248^252^254^ $(( (${#1} - ${#x})*2 )) ${x%%.*}
            x=${1%%$3*}
            echo $(( $2 + (${#x}/4) ))
          }

          add_iface() {
            local name
            for name in "${IFACES[@]}"; do [[ "${name}" == "${1}" ]]&& return 0; done
            IFACES+=("${1}")
          }

          render_connection() {
            local name="${1}"
            local ipv4="${ifipv4[${name}]:-dhcp}"
            local ipv6="${ifipv6[${name}]:-disabled}"
            local privacy="${ifipv6_privacy[${name}]:-on}"
            local out=""
            privacy="${privacy,,}"

            out+="[connection]"$'\n'
            out+="type=ethernet"$'\n'
            out+="id=${name}"$'\n'
            out+=$'\n'"[ethernet]"$'\n'
            out+="mac-address=${ifmac[${name}]}"$'\n'
            out+=$'\n'"[ipv4]"$'\n'
            if [[ "${ipv4}" == "dhcp" ]]; then
              out+="method=auto"$'\n'
            else
              out+="method=manual"$'\n'
              out+="addresses=${ipv4}"$'\n'
              [[ -n "${ifipv4_gw[${name}]:-}" ]]&& out+="gateway=${ifipv4_gw[${name}]}"$'\n'
            fi
            [[ -n "${nameservers}" ]]&& out+="dns=${nameservers}"$'\n'
            [[ -n "${searchdomain}" ]]&& out+="dns-search=${searchdomain}"$'\n'
            out+=$'\n'"[ipv6]"$'\n'
            case "${ipv6}" in
              slaac)
                out+="method=auto"$'\n'
                if [[ "${privacy}" =~ ^(off|no|false|0|disabled)$ ]]; then
                  out+="ip6-privacy=0"$'\n'
                  out+="addr-gen-mode=0"$'\n'   # eui64: address derived from the mac
                else
                  out+="ip6-privacy=2"$'\n'     # prefers the temporary ipv6
                  out+="addr-gen-mode=1"$'\n'   # stable ipv6 is randomly generated
                fi
              ;;
              dhcp)
                out+="method=dhcp"$'\n'
              ;;
              static)
                out+="method=manual"$'\n'
                out+="addresses=${ifipv6_addr[${name}]:-}"$'\n'
                [[ -n "${ifipv6_gw[${name}]:-}" ]]&& out+="gateway=${ifipv6_gw[${name}]}"$'\n'
              ;;
              *)
                out+="method=disabled"$'\n'
              ;;
            esac
            printf '%s' "${out}"
          }

          # ===================================================================================
          # main()
          [[ -x /usr/local/bin/yq ]]|| {
            echo "[ERROR]: Network: yq not available..."
            exit 1
          }

          if ! mount | grep -q " ${CIPATH} "; then
            [[ ! -e /dev/sr0 ]]&& {
              echo "[INFO]: Network: no cloudinit drive found..."
              exit 0
            }
            mkdir -p ${CIPATH}
            mount -o ro /dev/sr0 ${CIPATH} || exit 1
            MOUNTED_BY_ME=true
          fi

          NETCONF=${CIPATH}/network-config
          VENDOR=${CIPATH}/vendor-data

          declare -A ifmac ifipv4 ifipv4_gw ifipv6 ifipv6_addr ifipv6_gw ifipv6_privacy
          IFACES=()

          # -----------------------------------------------------------------------------------
          # base config from cloudinit
          netcards=0 nameservers="" searchdomain=""
          [[ -e ${NETCONF} ]]&& netcards="$(${YQ} ${NETCONF} 'config[*].name' 2>/dev/null | wc -l)"
          [[ ${netcards} -gt 0 ]]&& {
            nameservers="$(${YQ} ${NETCONF} "config[${netcards}].address[*]" 2>/dev/null | paste -s -d ";" -)" || nameservers=""
            searchdomain="$(${YQ} ${NETCONF} "config[${netcards}].search[*]" 2>/dev/null | paste -s -d ";" -)" || searchdomain=""
          }
          for (( i=0; i<${netcards}; i++ )); do
            name="net${i}"
            add_iface "${name}"
            ifmac[${name}]="$(${YQ} ${NETCONF} "config[${i}].mac_address" 2>/dev/null)" || true

            ipv4_type="$(${YQ} ${NETCONF} "config[${i}].subnets[0].type" 2>/dev/null)" || ipv4_type=""
            if [[ "${ipv4_type}" == "static" ]]; then
              ipv4="$(${YQ} ${NETCONF} "config[${i}].subnets[0].address" 2>/dev/null)" || ipv4=""
              netmask="$(${YQ} ${NETCONF} "config[${i}].subnets[0].netmask" 2>/dev/null)" || netmask=""
              # NetworkManager keyfiles require a cidr prefix length,
              # a dotted netmask makes the whole profile fail to load
              if [[ "${ipv4}" == */* ]]; then cidr="" # address already contains a prefix
              elif [[ "${netmask}" == *.* ]]; then cidr="/$(mask2cdr ${netmask})"
              elif [[ -n "${netmask}" ]]; then cidr="/${netmask}"
              else cidr="/24"; fi
              ifipv4[${name}]="${ipv4}${cidr}"
              ifipv4_gw[${name}]="$(${YQ} ${NETCONF} "config[${i}].subnets[0].gateway" 2>/dev/null)" || true
            else
              ifipv4[${name}]="dhcp"
            fi

            ipv6_type="$(${YQ} ${NETCONF} "config[${i}].subnets[1].type" 2>/dev/null)" || ipv6_type=""
            case "${ipv6_type}" in
              ipv6_slaac) ifipv6[${name}]="slaac" ;;
              dhcp6)      ifipv6[${name}]="dhcp" ;;
              static6)
                ifipv6[${name}]="static"
                ifipv6_addr[${name}]="$(${YQ} ${NETCONF} "config[${i}].subnets[1].address" 2>/dev/null)" || true
                ifipv6_gw[${name}]="$(${YQ} ${NETCONF} "config[${i}].subnets[1].gateway" 2>/dev/null)" || true
              ;;
              *) ifipv6[${name}]="disabled" ;;
            esac
          done

          # -----------------------------------------------------------------------------------
          # overrides from the proxmox notes field (vendor-data network section)
          overrides=0
          [[ -e ${VENDOR} ]]&& overrides="$(${YQ} ${VENDOR} 'network[*].name' 2>/dev/null | wc -l)"
          for (( i=0; i<${overrides}; i++ )); do
            name="$(${YQ} ${VENDOR} "network[${i}].name" 2>/dev/null)" || continue
            [[ "${name}" =~ ^net[0-9]+$ ]]|| {
              echo "[WARN]: Network: invalid interface name \"${name}\" in notes, skipping..."
              continue
            }
            add_iface "${name}"

            v="$(${YQ} ${VENDOR} "network[${i}].mac" 2>/dev/null)"&& ifmac[${name}]="${v}"
            v="$(${YQ} ${VENDOR} "network[${i}].ipv4" 2>/dev/null)"&& {
              if [[ "${v}" == "dhcp" ]]; then
                ifipv4[${name}]="dhcp"
              elif [[ "${v}" == */* ]]; then
                ifipv4[${name}]="${v}"
              else
                echo "[WARN]: Network: ipv4=${v} on ${name} has no prefix length, assuming /24..."
                ifipv4[${name}]="${v}/24"
              fi
            }
            v="$(${YQ} ${VENDOR} "network[${i}].ipv4_gateway" 2>/dev/null)"&& ifipv4_gw[${name}]="${v}"
            v="$(${YQ} ${VENDOR} "network[${i}].ipv6" 2>/dev/null)"&& {
              case "${v}" in
                slaac|dhcp|disabled) ifipv6[${name}]="${v}" ;;
                *) echo "[WARN]: Network: unknown ipv6 mode \"${v}\" on ${name}, ignoring..." ;;
              esac
            }
            v="$(${YQ} ${VENDOR} "network[${i}].ipv6_privacy" 2>/dev/null)"&& ifipv6_privacy[${name}]="${v}"
          done

          # -----------------------------------------------------------------------------------
          # write keyfiles, cleanup stale ones and reload on change
          [[ ${#IFACES[@]} -eq 0 ]]&& {
            echo "[INFO]: Network: no network configuration found, leaving system untouched..."
            exit 0
          }

          CHANGED=false
          WANTED=()
          for name in "${IFACES[@]}"; do
            [[ -n "${ifmac[${name}]:-}" ]]|| {
              echo "[WARN]: Network: no mac address for ${name}, skipping..."
              continue
            }
            WANTED+=("${name}")
            desired="$(render_connection "${name}")"
            file="${NMPATH}/${name}.nmconnection"
            [[ -e "${file}" ]]&& [[ "x$(cat "${file}")" == "x${desired}" ]]&& continue
            echo -n "[INFO]: Network: writing ${file}... "
            install --mode=0600 /dev/null "${file}" || { echo "[failed]"; continue; }
            printf '%s\n' "${desired}" > "${file}"
            CHANGED=true
            echo "[done]"
          done

          [[ ${#WANTED[@]} -eq 0 ]]&& {
            echo "[WARN]: Network: no usable interface configuration, leaving system untouched..."
            exit 0
          }

          # remove profiles that we manage but that are no longer configured
          for file in "${NMPATH}"/net*.nmconnection; do
            [[ -e "${file}" ]]|| continue
            name="$(basename "${file}" .nmconnection)"
            [[ "${name}" =~ ^net[0-9]+$ ]]|| continue
            keep=false
            for want in "${WANTED[@]}"; do [[ "${want}" == "${name}" ]]&& keep=true; done
            ${keep} || {
              echo "[INFO]: Network: removing stale profile ${name}..."
              rm -f "${file}"
              CHANGED=true
            }
          done
          [[ -e "${NMPATH}/default_connection.nmconnection" ]]&& {
            rm -f "${NMPATH}/default_connection.nmconnection"
            CHANGED=true
          }

          ${CHANGED} || {
            echo "[INFO]: Network: configuration unchanged..."
            exit 0
          }

          echo "[INFO]: Network: configuration changed, reloading..."
          nmcli connection reload || { echo "[ERROR]: Network: connection reload failed..."; exit 1; }
          nmcli networking off
          nmcli networking on || { echo "[ERROR]: Network: failed to re-enable networking..."; exit 1; }
          systemctl restart arexoor-motd.service 2> /dev/null

          # the network change kills the connections of services started before it
          # (e.g. image pulls and the rpm-ostree download on first boot):
          # restart the affected services best-effort, --no-block so a slow
          # image pull cannot hang this script
          echo "[INFO]: Network: restarting network dependent services..."
          systemctl restart --no-block tailscale.service setup-qemu-guest-agent.service 2> /dev/null
          systemctl --machine=core@.host --user restart --no-block socket-proxy-dockhand.service dockhand.service 2> /dev/null

          exit 0

# apply cloudinit script
    - path: /usr/local/bin/geco-cloudinit
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          #
          #  Copyright (c) 2020 Geco-iT Team - All right reserved
          #  Geco-iT <contact@geco-it.fr>
          #
          #  $Id: geco-cloudinit 2020-11-26 18:36:24Z cduchenoy $
          #
          #  Apply Basic Cloudinit Settings
          #
          # ===================================================================================
          declare -r VERSION=1.2607

          set -e
          trap 'catch $?' EXIT

          CIPATH=/run/cloudinit
          YQ="yq read --exitStatus --printMode v --stripComments --"

          # ===================================================================================
          # functions()
          catch() {
            ${MOUNTED:-false} && umount ${CIPATH} && rmdir ${CIPATH}
          }
          mount | grep -q /run/cloudinit && MOUNTED=true # init

          # use for vm clone
          sysprep() {
            echo "Remove all ssh system keys..."
            rm -f /etc/ssh/ssh_host_*

            echo "Clean ostree database..."
            rpm-ostree cleanup --base --pending --rollback --repomd

            echo "Remove all local user..."
            for user in $(awk -F: -v uiduser="1000" '{if ($3>=uiduser) print $1}' /etc/passwd); do
              userdel --force --remove ${user}
            done

            echo "Purge all docker ressources..."
            docker system prune --all --force

            echo "Remove all network/machine settings..."
            rm -f /var/lib/NetworkManager/*
            echo "" > /etc/machine-id

            echo "Purge all system logs..."
            journalctl --rotate --vacuum-time=1s
            systemctl stop systemd-journald*
            rm -rf /var/log/journal/*
            rm -rf /var/log/ssd/*

            echo "Force run cloudinit on next reboot..."
            echo "fake" > /var/.cloudinit

            echo -e "\nShutdown now..."
            poweroff

            exit 0
          }
          [[ "x${1}" == "xsysprep" ]]&& sysprep

          setup_yq() {
            local VER=3.4.1

            [[ -x /usr/bin/wget ]]&& download_command="wget --quiet --show-progress --output-document"  || download_command="curl -s --location --output"
            [[ -x /usr/local/bin/yq ]]&& [[ "x$(/usr/local/bin/yq --version | awk '{print $NF}')" == "x${VER}" ]]&& return 0
            echo "Setup yaml parser tools yq..."
            rm -f /usr/local/bin/yq
            ${download_command} /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/${VER}/yq_linux_amd64
            chmod 755 /usr/local/bin/yq
          }
          setup_yq

          # ===================================================================================
          # main()
          [[ ! -e /dev/sr0 ]]&& {
            echo "[INFO]: Cloudinit: any drive found..."
            exit 0
          }
          mkdir -p ${CIPATH}
          mount -o ro /dev/sr0 ${CIPATH}
          MOUNTED=true

          [[ ! -e ${CIPATH}/meta-data ]]&& {
            echo "[ERROR]: Cloudinit: nocloud metada not found..."
            exit 1
          }

          # network läuft immer: file-basiert & idempotent, repariert
          # eine kaputte konfiguration bei jedem boot (siehe geco-network)
          /usr/local/bin/geco-network || echo "[WARN]: Cloudinit: network configuration failed..."

          cloudinit_instanceid="$(${YQ} ${CIPATH}/meta-data 'instance-id')"
          if [[ -e /var/.cloudinit ]]
          then
            [[ "x$(cat /var/.cloudinit)" == "x${cloudinit_instanceid}" ]]&& {
            echo "[INFO]: Cloudinit any change detected..."
            exit 0
            }

            # hostname
            NEWHOSTNAME="$(${YQ} ${CIPATH}/user-data 'hostname' 2> /dev/null)"
            [[ -n "${NEWHOSTNAME}" ]]&& [[ "x${NEWHOSTNAME,,}" != "x$(hostname)" ]]&& {
              echo -n "[INFO]: Cloudinit: set hostname to ${NEWHOSTNAME,,}... "
              hostnamectl set-hostname ${NEWHOSTNAME,,} || { echo "[failed]"; exit 1; }
              MUST_REBOOT=true
              echo "[done]"
            }
            # username
            NEWUSERNAME="$(${YQ} ${CIPATH}/user-data 'user' 2> /dev/null)" || true # cant be empty if no cloudinit user defined
            [[ "x${NEWUSERNAME}" == "x" ]] && NEWUSERNAME="admin" # NEWUSERNAME="core" use "admin" on geco-template
            getent passwd ${NEWUSERNAME} &> /dev/null || {
              echo -n "[INFO]: Cloudinit: add sytem user: ${NEWUSERNAME}... "
              useradd --comment "CoreOS Administrator" --create-home \
                      --groups adm,wheel,sudo,systemd-journal,docker ${NEWUSERNAME} &> /dev/null || { echo "[failed]"; exit 1; }
              echo "[done]"
            }
            # passwd
            if NEWPASSWORD="$(${YQ} ${CIPATH}/user-data 'password' 2> /dev/null)"; then
              [[ -n "${NEWPASSWORD}" ]]&& [[ "x${NEWPASSWORD}" != "x$(grep ^${NEWUSERNAME} /etc/shadow | awk -F: '{print $2}')" ]]&& {
                echo -n "[INFO]: Cloudinit: set password for user ${NEWUSERNAME}... "
                sed -e "/^${NEWUSERNAME}/d" -i /etc/shadow &> /dev/null || { echo "[failed]"; exit 1; }
                echo "${NEWUSERNAME}:${NEWPASSWORD}:18000:0:99999:7:::" >> /etc/shadow || { echo "[failed]"; exit 1; }
                chage --lastday "$(date +%Y-%m-%d)" ${NEWUSERNAME} &> /dev/null || { echo "[failed]"; exit 1; }
                echo "[done]"
              }
            fi
            # ssh key
            [[ -e /var/home/${NEWUSERNAME}/.ssh/authorized_keys.d/ignition ]] || {
              install --directory --owner=${NEWUSERNAME} --group=${NEWUSERNAME} \
                      --mode=0700 /var/home/${NEWUSERNAME}/.ssh &> /dev/null || { echo "[failed]"; exit 1; }
              install --directory --owner=${NEWUSERNAME} --group=${NEWUSERNAME} \
                      --mode=0700 /var/home/${NEWUSERNAME}/.ssh/authorized_keys.d &> /dev/null || { echo "[failed]"; exit 1; }
              install --owner=${NEWUSERNAME} --group=${NEWUSERNAME} \
                      --mode=0600 /dev/null /var/home/${NEWUSERNAME}/.ssh/authorized_keys.d/ignition &> /dev/null || { echo "[failed]"; exit 1; }
            }
            echo -n "[INFO]: Cloudinit: wrote ssh authorized keys file for user: ${NEWUSERNAME}... "
            ${YQ} ${CIPATH}/user-data 'ssh_authorized_keys[*]' > /var/home/${NEWUSERNAME}/.ssh/authorized_keys.d/ignition 2> /dev/null || { echo "[failed]"; exit 1; }
            echo "[done]"
          fi

          echo -n "[INFO]: Cloudinit: save instance id... "
          echo "${cloudinit_instanceid}" > /var/.cloudinit
          echo "[done]"
          ${MUST_REBOOT:-false}&& {
            echo "[INFO]: Cloudinit: applied settings; must reboot..."
            /bin/systemctl --no-block reboot
          }

          exit 0

# arexoor-issue
    - path: /etc/issue.d/00_arexoor.issue
      mode: 0644
      contents:
        inline: |

          Welcome on a server powered by
                                                  _
            __ _ _ __ _____  _____   ___  _ __ __| | _____   __
           / _` | '__/ _ \ \/ / _ \ / _ \| '__/ _` |/ _ \ \ / /
          | (_| | | |  __/>  < (_) | (_) | | | (_| |  __/\ V /
           \__,_|_|  \___/_/\_\___/ \___/|_|(_)__,_|\___| \_/

          .

# kernel config
    - path: /etc/sysctl.d/20-silence-audit.conf
      mode: 0644
      contents:
        inline: |
          # Raise console message logging level from DEBUG (7) to WARNING (4)
          # to hide audit messages from the interactive console
          kernel.printk=4

    - path: /etc/sysctl.d/90-unprivileged-ports.conf
      mode: 0644
      contents:
        inline: |
          net.ipv4.ip_unprivileged_port_start=23

    - path: /etc/sysctl.d/91-ipv6-privacy.conf
      mode: 0644
      contents:
        inline: |
          net.ipv6.conf.default.temp_prefered_lft = 1500
          net.ipv6.conf.default.temp_valid_lft = 1800

# delay user sessions (rootless podman quadlets) until geco-virtiofs handled the mounts
    - path: /etc/systemd/system/user@.service.d/geco-virtiofs.conf
      mode: 0644
      contents:
        inline: |
          [Unit]
          After=geco-virtiofs.service

# dockhand deployed containers store their volumes on the virtiofs (volume_path),
# do not restart them when the virtiofs is not mounted
    - path: /etc/systemd/user/podman-restart.service.d/geco-virtiofs.conf
      mode: 0644
      contents:
        inline: |
          [Unit]
          ConditionPathIsMountPoint=/var/mnt/volume-storage

# creating podman network for the reverse proxy
    - path: /etc/containers/systemd/users/1000/rproxy.network
      mode: 0644
      contents:
        inline: |
          [Network]
          Subnet=10.80.0.0/24
          Gateway=10.80.0.1
          IPRange=10.80.0.128/25
          Internal=true
          NetworkName=rproxy

# adding rootfull tailscale Quadlet
    - path: /etc/containers/systemd/tailscale.container
      mode: 0644
      contents:
        inline: |
          [Unit]
          Description=Tailscale VPN
          After=network-online.target geco-virtiofs.service
          Wants=network-online.target
          # the tailscale-state volume lives on the virtiofs (volume_path),
          # never start without the storage mounted
          ConditionPathIsMountPoint=/var/mnt/volume-storage

          [Container]
          Image=docker.io/tailscale/tailscale:stable
          ContainerName=tailscale
          HostName=tailscale
          AutoUpdate=registry

          # Persist state across reboots
          Volume=tailscale-state:/var/lib/tailscale:Z
          # runtime socket on a root-only tmpfs path: rootless never talks to
          # the real socket, docktail uses the filtered one from
          # tailscale-socket-proxy
          Volume=/run/tailscale:/var/run/tailscale:z

          AddDevice=/dev/net/tun

          Network=host

          AddCapability=NET_ADMIN
          AddCapability=NET_RAW

          # Configuration
          Environment=TS_STATE_DIR=/var/lib/tailscale
          Environment=TS_USERSPACE=false
          # Environment=TS_ENABLE_HEALTH_CHECK=true
          Environment=TS_AUTH_ONCE=true
          Environment=TS_SOCKET=/var/run/tailscale/tailscaled.sock
          Environment=TS_HOSTNAME=CoreOS-central-gen2
          Environment=TS_ACCEPT_DNS=true

          # Heath check
          # HealthCmd=wget -q --spider localhost:9002/healthz
          # HealthInterval=1m
          # HealthTimeout=5s
          # HealthRetries=3
          # HealthStartPeriod=10s

          [Service]
          Restart=always
          TimeoutStartSec=300
          ExecStartPre=mkdir -p -m 0700 /run/tailscale

          [Install]
          WantedBy=default.target

# tailscale socket proxy: docktail (rootless, core userspace) must change the
# tailscale serve config, but tailscaled only allows root to do that (peer
# credential check on the socket, independent of file permissions). This proxy
# connects to the real socket as root and exposes a filtered socket to the
# core user, allowlisting only the localapi endpoints needed for "serve".
    - path: /etc/containers/systemd/tailscale-socket-proxy.container
      mode: 0644
      contents:
        inline: |
          [Unit]
          Description=Tailscale socket proxy for docktail
          After=tailscale.service
          Requires=tailscale.service
          # same guard as tailscale itself
          ConditionPathIsMountPoint=/var/mnt/volume-storage

          [Container]
          Image=ghcr.io/wollomatic/socket-proxy:1
          ContainerName=tailscale-socket-proxy
          AutoUpdate=registry
          ReadOnly=true
          # the image defaults to user 65534 (nobody), but this proxy must run
          # as root: tailscaled's peer credential check has to see uid 0
          User=0:0

          # the real tailscaled socket: the proxy connects as root, which
          # satisfies tailscaled's internal peer credential check
          Volume=/run/tailscale:/var/run/tailscale:z
          # the filtered socket for docktail: mount this directory into
          # docktail at /var/run/tailscale
          Volume=/var/home/core/quadlet-storage/docktail-tailscale-socket:/run/filtered:z

          # allow only what the tailscale cli needs for "serve" (docktail
          # shells out to the bundled cli), everything else (logout, taildrop,
          # keys, certs, debug, ...) is blocked. Blocked requests are logged:
          # journalctl -u tailscale-socket-proxy.service
          Exec=-loglevel=info \
               -socketpath=/var/run/tailscale/tailscaled.sock \
               -proxysocketendpoint=/run/filtered/tailscaled.sock \
               -proxysocketendpointfilemode=0666 \
               -watchdoginterval=120 \
               -stoponwatchdog \
               -shutdowngracetime=5 \
               -allowGET=/localapi/v0/(status|prefs|serve-config|check-funnel-access|watch-ipn-bus) \
               -allowPOST=/localapi/v0/(serve-config|query-feature) \
               -allowPATCH=/localapi/v0/prefs

          [Service]
          Restart=always
          RestartSec=5
          TimeoutStartSec=300
          # socket-proxy exits immediately when the backend socket is missing:
          # tailscaled needs a moment after container start to bind it, so
          # wait for the socket (bounded by TimeoutStartSec)
          ExecStartPre=/bin/sh -c 'until test -S /run/tailscale/tailscaled.sock; do sleep 1; done'
          # the directory is only accessible for core, so the 0666 socket
          # inside is still limited to the core user (docktail)
          ExecStartPre=/bin/mkdir -p /var/home/core/quadlet-storage/docktail-tailscale-socket
          ExecStartPre=/bin/chown 1000:1000 /var/home/core/quadlet-storage/docktail-tailscale-socket
          ExecStartPre=/bin/chmod 0750 /var/home/core/quadlet-storage/docktail-tailscale-socket

          [Install]
          WantedBy=default.target

    - path: /etc/containers/systemd/users/1000/gw_dockhand.network
      mode: 0644
      contents:
        inline: |
          [Network]
          Subnet=10.80.200.4/30
          NetworkName=gw_dockhand

    - path: /etc/containers/systemd/users/1000/socket-proxy-dockhand.network
      mode: 0644
      contents:
        inline: |
          [Network]
          NetworkName=socket-proxy-dockhand
          Internal=true

    - path: /etc/containers/systemd/users/1000/socket-proxy-dockhand.container
      mode: 0644
      contents:
        inline: |
          [Unit]
          Description=socket-proxy-dockhand
          After=network-online.target podman.socket
          Wants=network-online.target podman.socket

          [Container]
          Image=ghcr.io/tecnativa/docker-socket-proxy:latest
          ContainerName=socket-proxy-dockhand
          AutoUpdate=registry

          # Persist state across reboots
          Volume=/run/user/1000/podman/podman.sock:/var/run/docker.sock:z
          Network=socket-proxy-dockhand.network

          # Security permissions
          SecurityLabelType=container_runtime_t

          # Required for Dockhand core functionality
          Environment=CONTAINERS=1
          Environment=IMAGES=1
          Environment=NETWORKS=1
          Environment=VOLUMES=1
          Environment=EVENTS=1
          Environment=POST=1
          Environment=DELETE=1
          # Required for dashboard host info and disk usage
          Environment=INFO=1
          Environment=SYSTEM=1
          # Required for vulnerability scanning
          Environment=ALLOW_START=1
          Environment=ALLOW_STOP=1
          Environment=ALLOW_RESTARTS=1
          # Optional: enable for terminal access
          Environment=EXEC=1

          [Service]
          Restart=always
          TimeoutStartSec=300

          [Install]
          WantedBy=default.target

# adding dockhand Quadlet
    - path: /etc/containers/systemd/users/1000/dockhand.container
      mode: 0644
      contents:
        inline: |
          [Unit]
          Description=dockhand
          After=default.target
          Requires=default.target
          After=socket-proxy-dockhand.container
          Requires=socket-proxy-dockhand.container
          # never start without the virtiofs storage mounted
          ConditionPathIsMountPoint=/var/mnt/volume-storage

          [Container]
          Image=docker.io/fnsys/dockhand:latest
          ContainerName=dockhand
          AutoUpdate=registry

          # Persist state across reboots
          Volume=/var/mnt/volume-storage/dockhand/_data:/var/mnt/volume-storage/dockhand/_data:Z
          Network=rproxy.network
          Network=socket-proxy-dockhand.network
          Network=gw_dockhand.network

          Environment=DATA_DIR=/var/mnt/volume-storage/dockhand/_data

          # Configuration
          PublishPort=127.0.0.1:3000:3000

          [Service]
          Restart=always
          TimeoutStartSec=300
          ExecStartPre=mkdir -p /var/mnt/volume-storage/dockhand/_data

          [Install]
          WantedBy=default.target

    - path: /etc/containers/containers.conf
      mode: 0644
      contents:
        inline: |
          [engine]
          # volume path override
          volume_path = "/var/mnt/volume-storage"

    - path: /var/home/core/.config/containers/containers.conf
      mode: 0644
      contents:
        inline: |
          [containers]
          log_size_max=10485760

    # - path: /etc/containers/storage.conf
    #   mode: 0644
    #   contents:
    #     inline: |
    #       [storage]
    #       #https://github.com/containers/storage/blob/main/docs/containers-storage.conf.5.md
    #       driver = "overlay"
    #       imagestore = "/var/mnt/image-storage"

    - path: /etc/zincati/config.d/55-updates-strategy.toml
      contents:
        inline: |
          [updates]
          strategy = "periodic"
          [[updates.periodic.window]]
          days = [ "Sat", "Sun" ]
          start_time = "6:30"
          length_minutes = 60

# Enabling podman.socket for the User core
  directories:
    - path: /var/home/core/.config
      user:
        name: core
      group:
        name: core
      mode: 0700

    - path: /var/home/core/.config/systemd
      user:
        name: core
      group:
        name: core
      mode: 0755

    - path: /var/home/core/.config/systemd/user
      user:
        name: core
      group:
        name: core
      mode: 0755

    - path: /var/home/core/.config/systemd/user/sockets.target.wants
      user:
        name: core
      group:
        name: core
      mode: 0755

  links:
    - path: /var/home/core/.config/systemd/user/sockets.target.wants/podman.socket
      target: /usr/lib/systemd/user/podman.socket
      user:
        name: core
      group:
        name: core
    - path: /var/home/core/.config/systemd/user/default.target.wants/podman-restart.service
      target: /usr/lib/systemd/user/podman-restart.service
      user:
        name: core
      group:
        name: core

# arexoor-motd.service
systemd:
  units:
    - name: arexoor-motd.service
      enabled: true
      contents: |
        [Unit]
        Description=arexoor Motd
        After=network-online.target

        [Service]
        Type=oneshot
        ExecStart=/usr/local/bin/arexoor-motd
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

# geco-virtiofs: discover and mount virtiofs shares on every boot
    - name: geco-virtiofs.service
      enabled: true
      contents: |
        [Unit]
        Description=Geco-iT VirtioFS automount
        Before=multi-user.target

        [Service]
        Type=oneshot
        TimeoutStartSec=0
        ExecStart=/usr/local/bin/geco-virtiofs
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

# geco-cloudinit: apply cloudinit settings on boot
    - name: geco-cloudinit.service
      enabled: true
      contents: |
        [Unit]
        Description=Geco-iT Cloudinit
        Wants=network-online.target
        After=network.target network-online.target

        [Service]
        Type=oneshot
        TimeoutStartSec=0
        ExecStart=/usr/local/bin/geco-cloudinit
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

# qemu-guest-agent
    - name: setup-qemu-guest-agent.service
      enabled: true
      contents: |
        [Unit]
        Description=arexoor Setup Qemu Guest Agent
        After=network-online.target rpm-ostree-install-tailscale.service
        Require=network-online.target rpm-ostree-install-tailscale.service
        ConditionKernelCommandLine=ignition.platform.id=qemu
        ConditionPathExists=!/var/lib/qemu-guest-agent.stamp

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/bin/rpm-ostree install --reboot --idempotent --allow-inactive qemu-guest-agent
        ExecStart=/bin/touch /var/lib/qemu-guest-agent.stamp
        ExecStart=/bin/systemctl --no-block reboot

        [Install]
        WantedBy=multi-user.target

# fstrim
    - name: fstrim.timer
      enabled: true

    - name: fstrim.service
      dropins:
        - name: override.conf
          contents: |
            [Service]
            ExecStart=
            ExecStart=/sbin/fstrim -av

# Enable linger for the user
    - name: enable-linger-core.service
      enabled: true
      contents: |
        [Unit]
        Description=Enable linger for core user
        After=systemd-user-sessions.service

        [Service]
        Type=oneshot
        ExecStart=/usr/bin/loginctl enable-linger core

        [Install]
        WantedBy=multi-user.target
