# motd script
    - path: /usr/local/bin/arexoor-motd
      mode: 0755
      contents:
        inline: |
          #!/bin/bash

          OUT=/etc/motd.d/00_arexoor.motd

          mkdir -p "$(dirname "$OUT")"

          echo -e "\nWelcome on a server powered by\n" > ${OUT}
          echo "                                         _            " >> ${OUT}
          echo "   __ _ _ __ _____  _____   ___  _ __ __| | _____   __" >> ${OUT}
          echo "  / _\` | '__/ _ \\ \\/ / _ \\ / _ \\| '__/ _\` |/ _ \\ \\ / /" >> ${OUT}
          echo " | (_| | | |  __/>  < (_) | (_) | |_| (_| |  __/\\ V / "; >> ${OUT}
          echo "  \\__,_|_|  \\___/_/\\_\\___/ \\___/|_(_)\\__,_|\\___| \\_/  " >> ${OUT}
          echo -e "\e[33mKernel:\e[0m $(uname -r)" >> ${OUT}
          echo -ne "\e[33mCPU:\e[0m $(grep ^processor /proc/cpuinfo | wc -l)" >> ${OUT}
          echo "$(grep "^model name" /proc/cpuinfo | head -n1 | awk -F: '{print $2}' | awk -F@ '{print $1}')" >> ${OUT}
          echo -e "\e[33mRAM:\e[0m $(free | grep Mem | awk '{print $2}' | xargs -i expr {} / 1000 / 1000 | xargs -i printf '%.0fG\n' {})" >> ${OUT}
          i=0; for disk in $(ls /dev/sd[a-z] /dev/vd[a-z] 2>/dev/null); do
                lsblk > /dev/null 2>&1 || break
                echo -e "\e[33mHDD${i} ($(basename ${disk})):\e[0m$(lsblk -n --nodeps ${disk} -o size)" >> ${OUT}
                i=$((i+1))
          done
          echo -e "\n\e[33mHostname:\e[0m "$(hostname -f) >> ${OUT}
          sleep 1; echo -e "\e[33mIPv4 Address:\e[0m $(ip route get 8.8.8.8 | awk 'NR==1 {print $7}')" >> ${OUT}
          echo -e "\e[33mPublic IPv4 Address:\e[0m $(curl https://ipv4.icanhazip.com)\n" >> ${OUT}

# apply cloudinit script
    - path: /usr/local/bin/geco-cloudinit
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          #
          #  Copyright (c) 2020 Geco-iT Team - All right reserved
          #  Geco-iT <contact@geco-it.fr>
          #
          #  $Id: geco-cloudinit 2020-11-26 18:36:24Z cduchenoy $
          #
          #  Apply Basic Cloudinit Settings
          #
          # ===================================================================================
          declare -r VERSION=1.2011

          set -e
          trap 'catch $?' EXIT

          CIPATH=/run/cloudinit
          YQ="yq read --exitStatus --printMode v --stripComments --"

          # ===================================================================================
          # functions()
          catch() {
            ${MOUNTED:-false} && umount ${CIPATH} && rmdir ${CIPATH}
          }
          mount | grep -q /run/cloudinit && MOUNTED=true # init

          # use for vm clone
          sysprep() {
            echo "Remove all ssh system keys..."
            rm -f /etc/ssh/ssh_host_*

            echo "Clean ostree database..."
            rpm-ostree cleanup --base --pending --rollback --repomd

            echo "Remove all local user..."
            for user in $(awk -F: -v uiduser="1000" '{if ($3>=uiduser) print $1}' /etc/passwd); do
              userdel --force --remove ${user}
            done

            echo "Purge all docker ressources..."
            docker system prune --all --force

            echo "Remove all network/machine settings..."
            rm -f /var/lib/NetworkManager/*
            echo "" > /etc/machine-id

            echo "Purge all system logs..."
            journalctl --rotate --vacuum-time=1s
            systemctl stop systemd-journald*
            rm -rf /var/log/journal/*
            rm -rf /var/log/ssd/*

            echo "Force run cloudinit on next reboot..."
            echo "fake" > /var/.cloudinit

            echo -e "\nShutdown now..."
            poweroff

            exit 0
          }
          [[ "x${1}" == "xsysprep" ]]&& sysprep

          setup_yq() {
            local VER=3.4.1

            [[ -x /usr/bin/wget ]]&& download_command="wget --quiet --show-progress --output-document"  || download_command="curl -s --location --output"
            [[ -x /usr/local/bin/yq ]]&& [[ "x$(/usr/local/bin/yq --version | awk '{print $NF}')" == "x${VER}" ]]&& return 0
            echo "Setup yaml parser tools yq..."
            rm -f /usr/local/bin/yq
            ${download_command} /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/${VER}/yq_linux_amd64
            chmod 755 /usr/local/bin/yq
          }
          setup_yq

          # network
          mask2cdr()
          {
            # Assumes there's no "255." after a non-255 byte in the mask
            local x=${1##*255.}
            set -- 0^^^128^192^224^240^248^252^254^ $(( (${#1} - ${#x})*2 )) ${x%%.*}
            x=${1%%$3*}
            echo $(( $2 + (${#x}/4) ))
          }

          cdr2mask()
          {
            # Number of args to shift, 255..255, first non-255 byte, zeroes
            set -- $(( 5 - ($1 / 8) )) 255 255 255 255 $(( (255 << (8 - ($1 % 8))) & 255 )) 0 0 0
            [[ $1 -gt 1 ]] && shift $1 || shift
            echo ${1-0}.${2-0}.${3-0}.${4-0}
          }

          setup_virtiofs_mounts() {
            local vendor_data="${CIPATH}/vendor-data"
            local MANAGED_MARKER="# managed-by=cloudinit-virtiofs"

            # Collect all currently managed unit files on the system
            declare -A active_units
            for existing_unit in /etc/systemd/system/*.mount; do
              [[ -e "${existing_unit}" ]] || continue
              grep -q "^${MANAGED_MARKER}$" "${existing_unit}" 2>/dev/null && \
                active_units["$(basename "${existing_unit}")"]="orphan" # assume orphan until confirmed
            done

            # No vendor-data: stop+disable+remove all managed units
            [[ ! -e "${vendor_data}" ]] && {
              echo "[INFO]: Cloudinit: no vendor-data found, skipping virtiofs mounts..."
            }

            local mount_count=0
            if [[ -e "${vendor_data}" ]]; then
              mount_count="$(${YQ} ${vendor_data} 'mounts[*].name' 2>/dev/null | wc -l)" || mount_count=0
            fi

            # Process mounts from vendor-data
            for (( i=0; i<${mount_count}; i++ )); do
              local name what where type options after_network unit_file

              name="$(${YQ} ${vendor_data} "mounts[${i}].name" 2>/dev/null)"       || continue
              what="$(${YQ} ${vendor_data} "mounts[${i}].what" 2>/dev/null)"       || continue
              where="$(${YQ} ${vendor_data} "mounts[${i}].where" 2>/dev/null)"     || continue
              type="$(${YQ} ${vendor_data} "mounts[${i}].type" 2>/dev/null)"       || continue
              options="$(${YQ} ${vendor_data} "mounts[${i}].options" 2>/dev/null)" || options=""

              unit_file="$(systemd-escape --path --suffix=mount "${where}")"
              local unit_path="/etc/systemd/system/${unit_file}"

              # Mark as confirmed (not an orphan)
              active_units["${unit_file}"]="confirmed"

              # Build unit content
              local unit_content="${MANAGED_MARKER}
          [Unit]
          Description=Mount VirtioFS ${name} directory
          DefaultDependencies=no"
              unit_content+="

          After=sysinit.target
          Before=multi-user.target"
              unit_content+="

          [Mount]
          What=${what}
          Where=${where}
          Type=${type}"
              [[ -n "${options}" ]] && unit_content+="
          Options=${options}"
              unit_content+="

          [Install]
          WantedBy=multi-user.target"

              # Skip if unchanged
              if [[ -e "${unit_path}" ]] && [[ "x$(cat "${unit_path}")" == "x${unit_content}" ]]; then
                echo "[INFO]: Cloudinit: mount unit ${unit_file} unchanged, skipping..."
                continue
              fi

              echo -n "[INFO]: Cloudinit: writing systemd mount unit ${unit_file}... "
              echo "${unit_content}" > "${unit_path}" || { echo "[failed]"; continue; }
              echo "[done]"

              [[ ! -d "${where}" ]] && {
                echo -n "[INFO]: Cloudinit: creating mountpoint ${where}... "
                mkdir -p "${where}" || { echo "[failed]"; continue; }
                echo "[done]"
              }

              echo -n "[INFO]: Cloudinit: enabling and starting ${unit_file}... "
              systemctl daemon-reload && \
              systemctl enable "${unit_file}" && \
              systemctl start "${unit_file}" || { echo "[failed]"; continue; }
              echo "[done]"
            done

            # Cleanup orphaned units (were managed by us, but no longer in vendor-data)
            local needs_daemon_reload=0
            for unit_file in "${!active_units[@]}"; do
              [[ "${active_units[${unit_file}]}" == "confirmed" ]] && continue

              local unit_path="/etc/systemd/system/${unit_file}"
              echo "[INFO]: Cloudinit: orphaned mount unit detected: ${unit_file}"

              echo -n "[INFO]: Cloudinit: stopping ${unit_file}... "
              systemctl stop "${unit_file}" 2>/dev/null && echo "[done]" || echo "[not active]"

              echo -n "[INFO]: Cloudinit: disabling ${unit_file}... "
              systemctl disable "${unit_file}" 2>/dev/null && echo "[done]" || echo "[not enabled]"

              mountpoint="$(grep ^Where= "${unit_path}" | cut -d= -f2)"
              echo -n "[INFO]: Cloudinit: removing unit file ${unit_file}... "
              rm -f "${unit_path}" && echo "[done]" || echo "[failed]"

              if [[ -n "${mountpoint}" ]] && [[ -d "${mountpoint}" ]]; then
                  rmdir "${mountpoint}" 2>/dev/null && echo "[done]" || echo "[not empty, skipping]"
              fi

              needs_daemon_reload=1
            done

            [[ ${needs_daemon_reload} -eq 1 ]] && {
              echo -n "[INFO]: Cloudinit: reloading systemd after cleanup... "
              systemctl daemon-reload && echo "[done]" || echo "[failed]"
            }
            return 0
          }

          # ===================================================================================
          # main()
          [[ ! -e /dev/sr0 ]]&& {
            echo "[INFO]: Cloudinit: any drive found..."
            exit 0
          }
          mkdir -p ${CIPATH}
          mount -o ro /dev/sr0 ${CIPATH}
          MOUNTED=true

          [[ ! -e ${CIPATH}/meta-data ]]&& {
            echo "[ERROR]: Cloudinit: nocloud metada not found..."
            exit 1
          }

          # virtiofs läuft immer, unabhängig von cloudinit änderungen
          setup_virtiofs_mounts

          cloudinit_instanceid="$(${YQ} ${CIPATH}/meta-data 'instance-id')"
          if [[ -e /var/.cloudinit ]]
          then
            [[ "x$(cat /var/.cloudinit)" == "x${cloudinit_instanceid}" ]]&& {
            echo "[INFO]: Cloudinit any change detected..."
            exit 0
            }

            # hostname
            NEWHOSTNAME="$(${YQ} ${CIPATH}/user-data 'hostname' 2> /dev/null)"
            [[ -n "${NEWHOSTNAME}" ]]&& [[ "x${NEWHOSTNAME,,}" != "x$(hostname)" ]]&& {
              echo -n "[INFO]: Cloudinit: set hostname to ${NEWHOSTNAME,,}... "
              hostnamectl set-hostname ${NEWHOSTNAME,,} || { echo "[failed]"; exit 1; }
              MUST_REBOOT=true
              echo "[done]"
            }
            # username
            NEWUSERNAME="$(${YQ} ${CIPATH}/user-data 'user' 2> /dev/null)" || true # cant be empty if no cloudinit user defined
            [[ "x${NEWUSERNAME}" == "x" ]] && NEWUSERNAME="admin" # NEWUSERNAME="core" use "admin" on geco-template
            getent passwd ${NEWUSERNAME} &> /dev/null || {
              echo -n "[INFO]: Cloudinit: add sytem user: ${NEWUSERNAME}... "
              useradd --comment "CoreOS Administrator" --create-home \
                      --groups adm,wheel,sudo,systemd-journal,docker ${NEWUSERNAME} &> /dev/null || { echo "[failed]"; exit 1; }
              echo "[done]"
            }
            # passwd
            if NEWPASSWORD="$(${YQ} ${CIPATH}/user-data 'password' 2> /dev/null)"; then
              [[ -n "${NEWPASSWORD}" ]]&& [[ "x${NEWPASSWORD}" != "x$(grep ^${NEWUSERNAME} /etc/shadow | awk -F: '{print $2}')" ]]&& {
                echo -n "[INFO]: Cloudinit: set password for user ${NEWUSERNAME}... "
                sed -e "/^${NEWUSERNAME}/d" -i /etc/shadow &> /dev/null || { echo "[failed]"; exit 1; }
                echo "${NEWUSERNAME}:${NEWPASSWORD}:18000:0:99999:7:::" >> /etc/shadow || { echo "[failed]"; exit 1; }
                chage --lastday "$(date +%Y-%m-%d)" ${NEWUSERNAME} &> /dev/null || { echo "[failed]"; exit 1; }
                echo "[done]"
              }
            fi
            # ssh key
            [[ -e /var/home/${NEWUSERNAME}/.ssh/authorized_keys.d/ignition ]] || {
              install --directory --owner=${NEWUSERNAME} --group=${NEWUSERNAME} \
                      --mode=0700 /var/home/${NEWUSERNAME}/.ssh &> /dev/null || { echo "[failed]"; exit 1; }
              install --directory --owner=${NEWUSERNAME} --group=${NEWUSERNAME} \
                      --mode=0700 /var/home/${NEWUSERNAME}/.ssh/authorized_keys.d &> /dev/null || { echo "[failed]"; exit 1; }
              install --owner=${NEWUSERNAME} --group=${NEWUSERNAME} \
                      --mode=0600 /dev/null /var/home/${NEWUSERNAME}/.ssh/authorized_keys.d/ignition &> /dev/null || { echo "[failed]"; exit 1; }
            }
            echo -n "[INFO]: Cloudinit: wrote ssh authorized keys file for user: ${NEWUSERNAME}... "
            ${YQ} ${CIPATH}/user-data 'ssh_authorized_keys[*]' > /var/home/${NEWUSERNAME}/.ssh/authorized_keys.d/ignition 2> /dev/null || { echo "[failed]"; exit 1; }
            echo "[done]"
            # Networking configuration
            netcards="$(${YQ} ${CIPATH}/network-config 'config[*].name' 2> /dev/null | wc -l)"
            nameservers="$(${YQ} ${CIPATH}/network-config "config[${netcards}].address[*]" 2> /dev/null | paste -s -d ";" -)"
            searchdomain="$(${YQ} ${CIPATH}/network-config "config[${netcards}].search[*]" 2> /dev/null | paste -s -d ";" -)"
            echo "[INFO]: Cloudinit: DNS Server=$nameservers - DNS Search=$searchdomain"
            for (( i=0; i<${netcards}; i++ )); do
              ipv4_type="" ipv4="" netmask="" gw="" macaddr="" # reset on each run
              ipv4_type="$(${YQ} ${CIPATH}/network-config config[${i}].subnets[0].type 2>/dev/null)" || true
              ipv4="$(${YQ} ${CIPATH}/network-config config[${i}].subnets[0].address 2> /dev/null)" || true
              netmask="$(${YQ} ${CIPATH}/network-config config[${i}].subnets[0].netmask 2> /dev/null)" || true
              cidr="$(mask2cdr ${netmask})" || true
              gw="$(${YQ} ${CIPATH}/network-config config[${i}].subnets[0].gateway 2> /dev/null)" || true

              macaddr="$(${YQ} ${CIPATH}/network-config config[${i}].mac_address 2> /dev/null)"

              ipv6_type="" ipv6_addr="" ipv6_gw=""
              ipv6_type="$(${YQ} ${CIPATH}/network-config config[${i}].subnets[1].type 2>/dev/null)" || true
              ipv6_addr="$(${YQ} ${CIPATH}/network-config config[${i}].subnets[1].address 2>/dev/null)" || true
              ipv6_gw="$(${YQ} ${CIPATH}/network-config config[${i}].subnets[1].gateway 2>/dev/null)" || true

              rm -f /etc/NetworkManager/system-connections/default_connection.nmconnection # remove default connexion settings
              if [[ -e /etc/NetworkManager/system-connections/net${i}.nmconnection ]]
              then
                echo "[INFO]: Cloudinit: NET$i: MAC=${macaddr}"
                if [[ "${ipv4_type}" == "static" ]];
                then
                  echo "[INFO]: Cloudinit: NET$i IPv4 Network: IP=${ipv4}/${netmask} - GW=${gw:-none}"
                  [[ "x$(nmcli connection show net${i} 2>/dev/null | grep ^ipv4.method: | awk '{print $2}')" != "xmanual" ]] && {
                    echo -n "[INFO]: Cloudinit: update Network config ipv4 for net${i}... "
                    nmcli c modify net${i} ipv4.addresses "" ipv4.gateway ""
                    nmcli c modify net${i} ipv4.addresses "${ipv4}/${cidr}"
                    nmcli c modify net${i} ipv4.method manual
                    [[ -n "${gw}" ]] && nmcli c modify net${i} ipv4.gateway "${gw}"
                    MUST_NET_RECONFIG=true
                    echo "[done]"
                  }
                else
                  [[ "x$(nmcli connection show net${i} 2>/dev/null | grep ^ipv4.method: | awk '{print $2}')" != "xauto" ]] && {
                    echo "[INFO]: Cloudinit: update Network config IPv4 DHCP for net${i}... "
                    nmcli c modify net${i} ipv4.method auto
                    nmcli c modify net${i} ipv4.addresses "" ipv4.gateway ""
                    MUST_NET_RECONFIG=true
                    echo "[done]"
                  }
                fi
                [[ "x${searchdomain}" != "x$(nmcli connection show net${i} 2> /dev/null | grep ^ipv4.dns-search: | awk '{print $2}' | tr ',' ';')" ]]&& {
                  echo -n "[INFO]: Cloudinit: update Network config dns seach for net${i}... "
                  nmcli c modify net${i} ipv4.dns-search "$(echo ${searchdomain} | tr ";" ",")"
                  MUST_NET_RECONFIG=true
                  echo "[done]"
                }
                [[ "x${nameservers}" != "x$(nmcli connection show net${i} 2> /dev/null | grep ^ipv4.dns: | awk '{print $2}' | tr ',' ';')" ]]&& {
                  echo -n "[INFO]: Cloudinit: update Network config dns server for net${i}... "
                  nmcli c modify net${i} ipv4.dns "$(echo ${nameservers} | tr ";" ",")"
                  MUST_NET_RECONFIG=true
                  echo "[done]"
                }
                if [[ "${ipv6_type}" == "dhcp6" ]]; then
                  [[ "x$(nmcli connection show net${i} 2>/dev/null | grep ^ipv6.method: | awk '{print $2}')" != "xdhcp" ]] && {
                    echo -n "[INFO]: Cloudinit: update Network config IPv6 DHCP for net${i}... "
                    nmcli c modify net${i} ipv6.method dhcp
                    mcli c modify net${i} ipv6.addresses "" ipv6.gateway "" ipv6.ip6-privacy -1 ipv6.addr-gen-mode default
                    MUST_NET_RECONFIG=true
                    echo "[done]"
                  }
                elif [[ "${ipv6_type}" == "static6" ]]; then
                  echo "[INFO]: Cloudinit: NET$i IPv6 Static: IP=${ipv6_addr} - GW=${ipv6_gw:-none}"
                  [[ "x$(nmcli connection show net${i} 2>/dev/null | grep ^ipv6.method: | awk '{print $2}')" != "xmanual" ]] && {
                    echo -n "[INFO]: Cloudinit: update Network config IPv6 static for net${i}... "
                    nmcli c modify net${i} ipv6.addresses "${ipv6_addr}"
                    nmcli c modify net${i} ipv6.method manual
                    nmcli c modify net${i} ipv6.ip6-privacy -1 ipv6.addr-gen-mode default
                    [[ -n "${ipv6_gw}" ]] && nmcli c modify net${i} ipv6.gateway "${ipv6_gw}"
                    MUST_NET_RECONFIG=true
                    echo "[done]"
                  }
                else
                  [[ "x$(nmcli connection show net${i} 2>/dev/null | grep ^ipv6.method: | awk '{print $2}')" != "xauto" ]] && {
                    echo -n "[INFO]: Cloudinit: update Network config IPv6 SLAAC for net${i}... "
                    nmcli c modify net${i} ipv6.method auto
                    nmcli c modify net${i} ipv6.addresses "" ipv6.gateway ""
                    nmcli c modify net${i} ipv6.ip6-privacy 2                   # prefers the temporary ipv6
                    nmcli c modify net${i} ipv6.addr-gen-mode stable-privacy    # stable ipv6 is randomly generated
                    MUST_NET_RECONFIG=true
                    echo "[done]"
                  }
                fi
              else
                echo -n "[INFO]: Cloudinit: wrote NetworkManager config for net${i}... "
                install --mode=0600 /dev/null /etc/NetworkManager/system-connections/net${i}.nmconnection &> /dev/null || { echo "[failed]"; exit 1; }
                echo -e "[connection]\ntype=ethernet\nid=net${i}\n#interface-name=eth${i}\n" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                echo -e "[ethernet]\nmac-address=${macaddr}\n" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                if [[ "${ipv4_type}" == "static" ]]; then
                  echo -e "[ipv4]\nmethod=manual\naddresses=${ipv4}/${netmask}" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                  [[ -n "${gw}" ]] && echo -e "gateway=${gw}" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                  echo -e "dns=${nameservers}\ndns-search=${searchdomain}" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                else
                  echo -e "[ipv4]\nmethod=auto\ndns=${nameservers}\ndns-search=${searchdomain}" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                fi
                echo -e "\n[ipv6]" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                if [[ "${ipv6_type}" == "ipv6_slaac" ]]; then
                  echo -e "\nmethod=auto\nip6-privacy=2\naddr-gen-mode=1" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                elif [[ "${ipv6_type}" == "dhcp6" ]]; then
                  echo -e "\nmethod=dhcp" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                elif [[ "${ipv6_type}" == "static6" ]]; then
                  echo -e "method=manual\naddresses=${ipv6_addr}" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                  [[ -n "${ipv6_gw}" ]] && echo -e "gateway=${ipv6_gw}" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                else
                  echo -e "method=disabled" >> /etc/NetworkManager/system-connections/net${i}.nmconnection
                fi
                MUST_NET_RECONFIG=true
                echo "[done]"
              fi
            done

            ${MUST_NET_RECONFIG:-false} && {
              echo "[INFO]: Cloudinit: must reload network..."
              nmcli connection reload
              nmcli networking off
              nmcli networking on
              systemctl restart arexoor-motd.service
            }
          fi

          ${MUST_NET_RECONFIG:-false}&& {
            echo "[INFO]: Cloudinit: must reload network..."
            nmcli connection reload
            nmcli networking off
            nmcli networking on
            systemctl restart arexoor-motd.service
          }

          echo -n "[INFO]: Cloudinit: save instance id... "
          echo "${cloudinit_instanceid}" > /var/.cloudinit
          echo "[done]"
          ${MUST_REBOOT:-false}&& {
            echo "[INFO]: Cloudinit: applied settings; must reboot..."
            /bin/systemctl --no-block reboot
          }

          exit 0

